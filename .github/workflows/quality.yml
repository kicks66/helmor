name: Quality

# Lint + typecheck run on macOS. Kmor is macOS-only; Windows and Linux
# quality gates were removed when we dropped cross-platform support.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Build sidecar binary
        uses: ./.github/actions/build-sidecar
        with:
          target-triple: aarch64-apple-darwin

      - name: Run lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run typecheck
        run: bun run typecheck
